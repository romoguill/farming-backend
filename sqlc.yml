version: "2"
sql:
  - engine: "postgresql"
    name: "database"
    queries: "./internal/database/query/"
    schema: "./internal/database/migration/"

    gen:
      go:
        package: "database"
        out: "./internal/database/query"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: true
        emit_exact_table_names: false
        emit_empty_slices: true
